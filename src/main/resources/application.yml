spring:
  application:
    name: log-processor

  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway управляет схемой
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    mongodb:
    # uri будет взят из SPRING_DATA_MONGODB_URI

  kafka:
    # bootstrap-servers будет взят из SPRING_KAFKA_BOOTSTRAP_SERVERS
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: event:io.github.bugrov.log_processor.api.dto.LogEventMessage, command:io.github.bugrov.log_processor.api.dto.CommandMessage
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP_ID:log-processor-group}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: event:io.github.bugrov.log_processor.api.dto.LogEventMessage

# Настройки приложения
app:
  kafka:
    topic:
      raw-events: ${APP_KAFKA_TOPIC_RAW_EVENTS:raw-events}
      # имя топика Kafka, в который приложение будет отправлять команды (например, "BLOCK_IP", "ALERT"), когда правило срабатывает.
      outgoing-commands: outgoing-commands
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP_ID:log-processor-group}

# Actuator (тумблер)
management:
  endpoints:
    web:
      exposure:
        include: health,info,shutdown
  endpoint:
    shutdown:
      enabled: true

# Логирование
logging:
  level:
    io.github.bugrov: INFO   # было DEBUG
    org.springframework.kafka: WARN
    org.mongodb.driver: WARN

synthetic:
  generator:
    enabled: ${SYNTHETIC_GENERATOR_ENABLED:false}
    background-interval-ms: 7000
    anomaly-interval-ms: 120000
    anomaly-burst-size: 10