name: Deploy to Timeweb (Java)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: root
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          source: "."
          target: "/opt/log-processor"
          overwrite: true

      - name: Create .env file on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: root
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          script: |
            cd /opt/log-processor
            cat > .env << 'EOF'
            POSTGRES_USER=admin
            POSTGRES_PASSWORD=admin
            POSTGRES_DB=logdb
            MONGO_INITDB_ROOT_USERNAME=admin
            MONGO_INITDB_ROOT_PASSWORD=admin
            MONGO_INITDB_DATABASE=logdb
            KAFKA_HEAP_OPTS=-Xmx256m -Xms128m
            SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/logdb
            SPRING_DATASOURCE_USERNAME=admin
            SPRING_DATASOURCE_PASSWORD=admin
            SPRING_DATA_MONGODB_URI=mongodb://admin:admin@mongodb:27017/logdb
            SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            APP_KAFKA_TOPIC_RAW_EVENTS=raw-events
            APP_KAFKA_CONSUMER_GROUP_ID=log-processor-group
            EOF

      - name: Restart Docker containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: root
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          script: |
            cd /opt/log-processor
            docker compose down
            docker compose pull
            docker compose up -d --build
            docker image prune -f